<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fondazione Pini</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:#ffffff; height:100%; width:100%; overflow:hidden; font-family:system-ui,-apple-system,sans-serif; }

  #topbar { position:fixed; top:0; left:0; right:0; z-index:10; display:flex; justify-content:space-between; align-items:center; padding:1.1rem 6vw; }
  #back {
    width:36px; height:36px; border-radius:50%;
    background:rgba(8,8,8,0.85); backdrop-filter:blur(3px);
    display:flex; align-items:center; justify-content:center;
    text-decoration:none; transition:background .3s;
  }
  #back:hover { background:#080808; }
  #back span {
    display:block; width:9px; height:9px;
    border-left:1.5px solid #ffffff; border-bottom:1.5px solid #ffffff;
    transform:rotate(45deg); margin-left:3px;
  }
  #lang { display:flex; gap:0.9rem; font-size:0.8rem; letter-spacing:0.03em; text-transform:lowercase; font-weight:700; }
  .lbtn { color:rgba(8,8,8,0.55); text-decoration:none; }
  .lbtn:hover { color:#080808; }
  .lbtn.active { color:#080808; font-weight:700; text-decoration:underline; }

  #stage { position:fixed; inset:0; display:flex; align-items:center; }
  #track {
    display:flex; align-items:center; gap:32px;
    overflow-x:auto; overflow-y:hidden;
    scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch;
    width:100%; height:100%;
    padding:0 calc(50vw - min(78vw,860px)/2);
    scrollbar-width:none;
  }
  #track::-webkit-scrollbar { display:none; }

  .slide {
    flex:0 0 auto; scroll-snap-align:center; cursor:pointer;
    width:min(78vw,860px);
    transition:opacity .35s ease, transform .35s ease;
  }
  .slide img { width:100%; height:auto; display:block; box-shadow:0 18px 50px rgba(0,0,0,0.12); }

  .navbtn {
    position:fixed; top:50%; transform:translateY(-50%); z-index:8;
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,0.9); border:1px solid rgba(8,8,8,0.25);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    transition:all .25s;
  }
  .navbtn:hover { background:#080808; border-color:#080808; }
  .navbtn:hover span { border-color:#ffffff; }
  .navbtn span { display:block; width:9px; height:9px; border-left:1.5px solid #080808; border-bottom:1.5px solid #080808; transition:border-color .25s; }
  #prevBtn { left:1.2rem; }
  #prevBtn span { transform:rotate(45deg); margin-left:3px; }
  #nextBtn { right:1.2rem; }
  #nextBtn span { transform:rotate(225deg); margin-right:3px; }

  #lightbox {
    position:fixed; inset:0; z-index:20; background:rgba(0,0,0,0.92);
    display:none; align-items:center; justify-content:center; padding:4vw;
    cursor:zoom-out;
  }
  #lightbox.open { display:flex; }
  #lightbox img { max-width:92vw; max-height:92vh; box-shadow:0 20px 60px rgba(0,0,0,0.6); }
</style>
</head>
<body>

<div id="topbar">
  <a id="back" href="summer-school-en.html" aria-label="back to the programme"><span></span></a>
  <div id="lang">
    <a class="lbtn" href="dove-siamo.html">italiano</a>
    <a class="lbtn active" href="where-we-are.html">english</a>
  </div>
</div>

<div id="stage">
  <div class="navbtn" id="prevBtn" aria-label="previous"><span></span></div>
  <div id="track"></div>
  <div class="navbtn" id="nextBtn" aria-label="next"><span></span></div>
</div>

<div id="lightbox">
  <img id="lightboxImg" src="" alt="">
</div>

<script>
  const FILES = [
    "pini-01.jpg","pini-02.jpg","pini-03.jpg","pini-04.jpg","pini-05.jpg","pini-06.jpg",
    "pini-07.jpg","pini-08.jpg","pini-09.jpg","pini-10.jpg","pini-11.jpg","pini-12.jpg",
    "pini-13.jpg","pini-14.jpg","pini-15.jpg","pini-16.jpg","pini-17.jpg","pini-18.jpg"
  ];
  const N = FILES.length;
  const SETS = 3;

  const track = document.getElementById("track");
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightboxImg");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  let slides = [];

  function buildTrack() {
    track.innerHTML = "";
    slides = [];
    for (let s = 0; s < SETS; s++) {
      FILES.forEach((f) => {
        const div = document.createElement("div");
        div.className = "slide";
        const img = document.createElement("img");
        img.src = "img/" + f;
        img.alt = "";
        div.appendChild(img);
        div.addEventListener("click", () => onSlideClick(div));
        track.appendChild(div);
        slides.push(div);
      });
    }
  }
  buildTrack();

  function activeIndex() {
    const cRect = track.getBoundingClientRect();
    const cCenter = cRect.left + cRect.width / 2;
    let best = 0, bestDist = Infinity;
    slides.forEach((s, i) => {
      const r = s.getBoundingClientRect();
      const d = Math.abs((r.left + r.width / 2) - cCenter);
      if (d < bestDist) { bestDist = d; best = i; }
    });
    return best;
  }

  function opacityForDistance(d) {
    if (d <= 0) return 1;
    if (d === 1) return 0.55;
    if (d === 2) return 0.18;
    return 0;
  }
  function scaleForDistance(d) {
    if (d <= 0) return 1;
    if (d === 1) return 0.9;
    if (d === 2) return 0.82;
    return 0.75;
  }

  function updateFade() {
    const active = activeIndex();
    slides.forEach((s, idx) => {
      const d = Math.abs(idx - active);
      s.style.opacity = opacityForDistance(d);
      s.style.transform = "scale(" + scaleForDistance(d) + ")";
      s.style.pointerEvents = d >= 3 ? "none" : "auto";
    });
    return active;
  }

  function goTo(i, smooth) {
    slides[i].scrollIntoView({ inline: "center", block: "nearest", behavior: smooth ? "smooth" : "auto" });
    updateFade();
  }

  function onSlideClick(el) {
    const i = slides.indexOf(el);
    const active = activeIndex();
    if (i === active) {
      lightboxImg.src = el.querySelector("img").src;
      lightbox.classList.add("open");
    } else {
      goTo(i, true);
    }
  }
  lightbox.addEventListener("click", () => {
    lightbox.classList.remove("open");
    lightboxImg.src = "";
  });

  let ticking = false;
  let scrollTimer = null;
  function onScroll() {
    if (!ticking) {
      requestAnimationFrame(() => { updateFade(); ticking = false; });
      ticking = true;
    }
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => {
      // se siamo usciti dal set centrale, saltiamo silenziosamente allo stesso
      // punto nel set centrale, così lo scroll sembra non finire mai
      const i = activeIndex();
      if (i < N) {
        goTo(i + N, false);
      } else if (i >= 2 * N) {
        goTo(i - N, false);
      }
    }, 90);
  }
  track.addEventListener("scroll", onScroll, { passive: true });

  prevBtn.addEventListener("click", () => goTo(activeIndex() - 1, true));
  nextBtn.addEventListener("click", () => goTo(activeIndex() + 1, true));

  window.addEventListener("resize", () => goTo(activeIndex(), false));

  // posizione iniziale: primo elemento del set centrale, al centro
  window.addEventListener("load", () => goTo(N, false));
  setTimeout(() => goTo(N, false), 60);
</script>
</body>
</html>
