<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fondazione Pini</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:#f2efe8; height:100%; width:100%; overflow:hidden; }

  #wrap { position:fixed; inset:0; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
  #wrap::-webkit-scrollbar { width:0; height:0; }

  .set { display:flex; gap:8px; padding:8px; align-items:flex-start; }
  .col { display:flex; flex-direction:column; gap:8px; flex:1; min-width:0; }

  .col img {
    display:block;
    width:100%;
    height:auto;
    cursor:zoom-in;
    transition:opacity .2s;
  }
  .col img:hover { opacity:0.88; }

  #back {
    position:fixed; top:1.2rem; left:1.2rem; z-index:6;
    width:36px; height:36px; border-radius:50%;
    background:rgba(8,8,8,0.55); backdrop-filter:blur(3px);
    display:flex; align-items:center; justify-content:center;
    text-decoration:none; transition:background .3s;
  }
  #back:hover { background:rgba(8,8,8,0.85); }
  #back span {
    display:block; width:9px; height:9px;
    border-left:1.5px solid rgba(232,228,220,0.9);
    border-bottom:1.5px solid rgba(232,228,220,0.9);
    transform:rotate(45deg); margin-left:3px;
  }

  #lightbox {
    position:fixed; inset:0; z-index:20; background:rgba(20,18,14,0.92);
    display:none; align-items:center; justify-content:center; padding:4vw;
    cursor:zoom-out;
  }
  #lightbox.open { display:flex; }
  #lightbox img { max-width:92vw; max-height:92vh; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
</style>
</head>
<body>

<a id="back" href="summer-school-en.html" aria-label="back to the programme"><span></span></a>

<div id="wrap">
  <div class="set" id="setA"></div>
  <div class="set" id="setB"></div>
  <div class="set" id="setC"></div>
</div>

<div id="lightbox">
  <img id="lightboxImg" src="" alt="">
</div>

<script>
  const FILES = [
    "pini-01.jpg","pini-02.jpg","pini-03.jpg","pini-04.jpg","pini-05.jpg","pini-06.jpg",
    "pini-07.jpg","pini-08.jpg","pini-09.jpg","pini-10.jpg","pini-11.jpg","pini-12.jpg",
    "pini-13.jpg","pini-14.jpg","pini-15.jpg","pini-16.jpg","pini-17.jpg","pini-18.jpg"
  ];
  const GAP = 8;

  const wrap = document.getElementById("wrap");
  const sets = [document.getElementById("setA"), document.getElementById("setB"), document.getElementById("setC")];
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightboxImg");

  function colCount() {
    const w = window.innerWidth;
    if (w < 640) return 2;
    if (w < 1000) return 3;
    return 4;
  }

  function openLightbox(src) {
    lightboxImg.src = src;
    lightbox.classList.add("open");
  }
  function closeLightbox() {
    lightbox.classList.remove("open");
    lightboxImg.src = "";
  }
  lightbox.addEventListener("click", closeLightbox);

  let ratios = null; // aspect ratio (w/h) per file, filled once images are measured

  function measureRatios() {
    return Promise.all(FILES.map(f => new Promise(resolve => {
      const img = new Image();
      img.onload = () => resolve(img.naturalWidth / img.naturalHeight);
      img.onerror = () => resolve(1);
      img.src = "img/" + f;
    })));
  }

  function buildSet(container, n) {
    container.innerHTML = "";
    const colWidth = (container.clientWidth - GAP * (n - 1)) / n;
    const cols = [];
    const colHeights = new Array(n).fill(0);
    for (let i = 0; i < n; i++) {
      const col = document.createElement("div");
      col.className = "col";
      container.appendChild(col);
      cols.push(col);
    }
    FILES.forEach((f, i) => {
      let shortest = 0;
      for (let c = 1; c < n; c++) if (colHeights[c] < colHeights[shortest]) shortest = c;
      const img = document.createElement("img");
      img.src = "img/" + f;
      img.alt = "";
      img.loading = "lazy";
      img.addEventListener("click", () => openLightbox("img/" + f));
      cols[shortest].appendChild(img);
      const h = colWidth / (ratios ? ratios[i] : 1.3);
      colHeights[shortest] += h + GAP;
    });
  }

  function rebuildAll() {
    const n = colCount();
    sets.forEach(s => buildSet(s, n));
    measure();
  }

  let H = 0;
  function measure() {
    H = sets[0].getBoundingClientRect().height;
    if (H > 0) wrap.scrollTop = H;
  }

  function onScroll() {
    if (H <= 0) return;
    if (wrap.scrollTop >= 2 * H) {
      wrap.scrollTop -= H;
    } else if (wrap.scrollTop <= 0) {
      wrap.scrollTop += H;
    }
  }

  let resizeTimer = null;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(rebuildAll, 200);
  });
  wrap.addEventListener("scroll", onScroll, { passive:true });

  measureRatios().then(r => {
    ratios = r;
    rebuildAll();
    setTimeout(measure, 150);
  });
</script>
</body>
</html>
