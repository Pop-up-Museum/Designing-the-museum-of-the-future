<script>
  /* scroll infinito manuale: tre set identici (A,B,C), si parte su B.
     l'utente scorre con le sue dita/rotellina; quando esce dal set
     centrale saltiamo silenziosamente di un'altezza di set, così il
     contenuto sembra non finire mai, ma il movimento resta tutto suo. */
  const wrap = document.getElementById("wrap");
  const setA = document.getElementById("setA");
  let H = 0;

  function measure() {
    H = setA.getBoundingClientRect().height;
    if (H > 0) wrap.scrollTop = H; // parte su set B
  }

  function onScroll() {
    if (H <= 0) return;
    if (wrap.scrollTop >= 2 * H) {
      wrap.scrollTop -= H;
    } else if (wrap.scrollTop <= 0) {
      wrap.scrollTop += H;
    }
  }

  const imgs = wrap.querySelectorAll("img");
  let loaded = 0;
  imgs.forEach(img => {
    if (img.complete) { loaded++; if (loaded === imgs.length) measure(); }
    else img.addEventListener("load", () => { loaded++; if (loaded === imgs.length) measure(); });
  });
  window.addEventListener("resize", measure);
  wrap.addEventListener("scroll", onScroll, { passive:true });
  setTimeout(measure, 300);
</script>
